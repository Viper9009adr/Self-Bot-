# Production: Pulls images from Google Artifact Registry
# Usage:
#   PROJECT_ID=your-project-id REPOSITORY=your-repo docker compose -f docker-compose.prod.yml up -d
# Optional:
#   REGION=us-central1 TAG=latest
# Image names:
#   ${REGION}-docker.pkg.dev/${PROJECT_ID}/${REPOSITORY}/self-bot:${TAG}
#   ${REGION}-docker.pkg.dev/${PROJECT_ID}/${REPOSITORY}/browser-worker:${TAG}

services:
  redis:
    image: redis:alpine
    volumes:
      - /mnt/docker-data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  browser-worker:
    image: ${REGION:-us-central1}-docker.pkg.dev/${PROJECT_ID}/${REPOSITORY}/browser-worker:${TAG:-latest}
    ports:
      - "3002:3002"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3002/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  bot:
    image: ${REGION:-us-central1}-docker.pkg.dev/${PROJECT_ID}/${REPOSITORY}/self-bot:${TAG:-latest}
    ports:
      - "8081:8080"
    environment:
      - REDIS_URL=redis://redis:6379
      - BROWSER_WORKER_URL=http://browser-worker:3002
      - RUNTIME_SKILLS_PATH=/app/runtime-skills
    volumes:
      - /mnt/docker-data/runtime-skills:/app/runtime-skills
      - /mnt/docker-data/whatsapp-session:/tmp/whatsapp-session
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
      browser-worker:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
