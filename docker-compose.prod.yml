# Production: Pulls images from Google Artifact Registry
# Usage:
#   PROJECT_ID=your-project-id REPOSITORY=your-repo docker compose -f docker-compose.prod.yml up -d
# Optional:
#   REGION=us-central1 TAG=latest
# Image names:
#   ${REGION}-docker.pkg.dev/${PROJECT_ID}/${REPOSITORY}/self-bot:${TAG}
#   ${REGION}-docker.pkg.dev/${PROJECT_ID}/${REPOSITORY}/browser-worker:${TAG}
#   ${REGION}-docker.pkg.dev/${PROJECT_ID}/${REPOSITORY}/hybrid-scraper:${TAG}

services:
  redis:
    image: redis:alpine
    volumes:
      - /mnt/docker-data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  browser-worker:
    image: ${REGION:-us-central1}-docker.pkg.dev/${PROJECT_ID}/${REPOSITORY}/browser-worker:${TAG:-latest}
    labels:
      - "traefik.enable=false"
    environment:
      - BROWSER_WORKER_HOST=0.0.0.0
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3002/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  hybrid-scraper:
    image: ${REGION:-us-central1}-docker.pkg.dev/${PROJECT_ID}/${REPOSITORY}/hybrid-scraper:${TAG:-latest}
    labels:
      - "traefik.enable=false"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  bot:
    image: ${REGION:-us-central1}-docker.pkg.dev/${PROJECT_ID}/${REPOSITORY}/self-bot:${TAG:-latest}
    environment:
      - NODE_ENV=production
      - REDIS_URL=redis://redis:6379
      - BROWSER_WORKER_URL=http://browser-worker:3002
      - HYBRID_SCRAPER_URL=http://hybrid-scraper:3000
      - HEALTHCHECK_PORT=8090
      - RUNTIME_SKILLS_PATH=/app/runtime-skills
    volumes:
      - /mnt/docker-data/runtime-skills:/app/runtime-skills
      - /mnt/docker-data/whatsapp-session:/tmp/whatsapp-session
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
      browser-worker:
        condition: service_healthy
      hybrid-scraper:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "sh", "-c", "curl -f http://localhost:$${HEALTHCHECK_PORT:-8090}/health || curl -f http://localhost:8090/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - default
      - traefik-public
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.bot.rule=Host(`bot.adanthos.com`)"
      - "traefik.http.routers.bot.entrypoints=websecure"
      - "traefik.http.routers.bot.tls=true"
      - "traefik.http.routers.bot.tls.certresolver=letsencrypt"
      - "traefik.http.services.bot.loadbalancer.server.port=8090"

networks:
  default: {}
  traefik-public:
    external: true
